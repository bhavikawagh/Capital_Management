<!DOCTYPE html>
<html>
<head>
    <title>Login - Asset Management System</title>
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #052377, #052377);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .login-container {
        background: #ffffff;
        padding: 40px;
        width: 350px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }
    .login-container h2 {
        margin-bottom: 10px;
        color: #333;
    }
    .login-container p {
        color: #666;
        font-size: 14px;
        margin-bottom: 30px;
    }
    .login-btn {
        width: 100%;
        padding: 12px;
        background-color: #0078D4;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }
    .login-btn:hover {
        background-color: #005a9e;
    }
    .footer-text {
        margin-top: 20px;
        font-size: 12px;
        color: #999;
    }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Asset Management System</h2>
        <p>Sign in using your Microsoft Account</p>
        <button class="login-btn" onclick="signIn()">
            Login with Microsoft
        </button>
        <div class="footer-text">
            © 2026 Asset System
        </div>
    </div>
   <script>
        const msalConfig = {
            auth: {
                clientId: "YOUR_CLIENT_ID",
                authority: "https://login.microsoftonline.com/YOUR_TENANT_ID",
                redirectUri: window.location.href
            }
        };
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        function signIn() {
            msalInstance.loginPopup({
                scopes: ["user.read"]
            }).then(response => {
                alert("Welcome " + response.account.username);
                window.location.href = "dashboard.html";
            }).catch(error => {
                console.log(error);
            });
        }
    </script>
</body>
</html>
