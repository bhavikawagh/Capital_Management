<!DOCTYPE html>
<html>
<head>
    <title>Asset Request</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
<!-- NAVBAR -->
<div class="navbar">
    <h2><i class="fa-solid fa-box"></i> Asset Management System</h2>
    <div><i class="fa-solid fa-user"></i> Admin</div>
</div>
<div class="dashboard">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <ul>
            <li>
                <a href="dashboard.html" class="nav-link">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
            </li>
            <li>
                <a href="capitalmaster.html" class="nav-link">
                    <i class="fa-solid fa-building-columns"></i> Capital Master
                </a>
            </li>
            <li class="active">
                <a href="index.html" class="nav-link">
                    <i class="fa-solid fa-gear"></i> Asset Master
                </a>
            </li>
            <li>
                <a href="list.html" class="nav-link">
                    <i class="fa-solid fa-list"></i> Records List
                </a>
            </li>
            <li>
                <a href="aboutus.html" class="nav-link">
                    <i class="fa-solid fa-circle-info"></i> About Us
                </a>
            </li>
        </ul>
    </div>
    <!-- CONTENT -->
    <div class="content">
        <div class="card">
            <h2>Asset Master Request </h2>
            <form id="assetForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Request ID</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Requester Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Request Date</label>
                        <input type="date" required>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Request To</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Capital Type</label>
                        <select required>
                            <option value="">--Select Capital Type--</option>
                            <option>Asset</option>
                            <option>Licenses</option>
                            <option>Stationary</option>
                            <option>Tools and Instruments</option>
                            <option>Electrical Equipment</option>
                            <option>Plant and Machinery</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Remarks</label>
                        <textarea rows="5" placeholder="Enter additional comments..."></textarea>
                    </div>
                </div>
                <button type="submit">Submit Request</button>
            </form>
        </div>
    </div>
</div>
<footer>
    © 2026 Asset Management System | All Rights Reserved
</footer>
<script>
document.getElementById("assetForm").addEventListener("submit", function(e){
    e.preventDefault();
    const allInputs = this.querySelectorAll("input, select, textarea");
    const formData = {
        source:        'asset',
        _id:           Date.now().toString(),
        requestId:     allInputs[0].value,
        requesterName: allInputs[1].value,
        requestDate:   allInputs[2].value,
        qty:           allInputs[3].value,
        requestTo:     allInputs[4].value,
        capitalType:   allInputs[5].value,
        remarks:       allInputs[6].value,
        savedOn:       new Date().toLocaleString()
    };
    // Basic validation
    let valid = true;
    this.querySelectorAll("input[required], select[required]").forEach(input => {
        if (!input.value) valid = false;
    });
    if (!valid) { alert('Please fill in all required fields.'); return; }
    let records = JSON.parse(localStorage.getItem('assetRecords') || '[]');
    records.push(formData);
    localStorage.setItem('assetRecords', JSON.stringify(records));
    alert('Asset request saved successfully!');
    this.reset();
});
</script>
</body>
</html>
