<script>
/*STORAGE KEYS */
const CAPITAL_KEY = 'capitalRecords';
const ASSET_KEY   = 'assetRecords';
let currentTab = 'all';
/* LOAD ALL RECORDS */
function getAllRecords() {
    const capitals = JSON.parse(localStorage.getItem(CAPITAL_KEY) || '[]');
    const assets   = JSON.parse(localStorage.getItem(ASSET_KEY)   || '[]');
    return [...capitals, ...assets];
}
/*SUMMARY CARDS */
function renderSummary() {
    const all      = getAllRecords();
    const capitals = all.filter(r => r.source === 'capital');
    const assets   = all.filter(r => r.source === 'asset');
    const active   = all.filter(r => r.status === 'Active');
    document.getElementById('summaryCards').innerHTML = `
        <div class="summary-card">
            <div class="icon icon-blue"><i class="fa-solid fa-layer-group"></i></div>
            <div class="info"><div class="num">${all.length}</div><div class="label">Total Records</div></div>
        </div>
        <div class="summary-card">
            <div class="icon icon-yellow"><i class="fa-solid fa-building-columns"></i></div>
            <div class="info"><div class="num">${capitals.length}</div><div class="label">Capital Records</div></div>
        </div>
        <div class="summary-card">
            <div class="icon icon-green"><i class="fa-solid fa-box"></i></div>
            <div class="info"><div class="num">${assets.length}</div><div class="label">Asset Records</div></div>
        </div>
        <div class="summary-card">
            <div class="icon icon-red"><i class="fa-solid fa-circle-check"></i></div>
            <div class="info"><div class="num">${active.length}</div><div class="label">Active</div></div>
        </div>
    `;
}
/* TABLE COLUMNS PER TAB */
function getColumns(tab) {
    if (tab === 'capital') {
        return ['#', 'Source', 'Capital ID', 'Capital Type', 'Financial Year', 'Allocated', 'Used', 'Remaining', 'Status', 'Remarks', 'Actions'];
    } else if (tab === 'asset') {
        return ['#', 'Source', 'Request ID', 'Requester Name', 'Request Date', 'Qty', 'Request To', 'Capital Type', 'Remarks', 'Actions'];
    } else {
        return ['#', 'Source', 'ID / Request ID', 'Name / Type', 'Date / Fin. Year', 'Type / Requester', 'Status / Qty', 'Remarks', 'Actions'];
    }
}
/* FILTER RECORDS*/
function getFiltered() {
    let all = getAllRecords();
    // Tab filter
    if (currentTab === 'capital') all = all.filter(r => r.source === 'capital');
    if (currentTab === 'asset')   all = all.filter(r => r.source === 'asset');
    // Search filter
    const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) {
        all = all.filter(r => JSON.stringify(r).toLowerCase().includes(search));
    }
    // Type filter
    const typeF = document.getElementById('typeFilter').value;
    if (typeF) {
        all = all.filter(r => (r.capitalType || '').toLowerCase().includes(typeF.toLowerCase()));
    }
    // Status filter
    const statusF = document.getElementById('statusFilter').value;
    if (statusF) {
        all = all.filter(r => (r.status || r.qty || '') === statusF);
    }
    return all;
}
/* RENDER TABLE */
function renderTable() {
    const records = getFiltered();
    const cols    = getColumns(currentTab);
    // Header
    document.getElementById('tableHead').innerHTML =
        cols.map(c => `<th>${c}</th>`).join('');
    // Count
    document.getElementById('recordsCount').textContent =
        `Showing ${records.length} record${records.length !== 1 ? 's' : ''}`;
    const tbody = document.getElementById('tableBody');
    if (records.length === 0) {
        tbody.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('recordsTable').style.display = 'none';
        return;
    }
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('recordsTable').style.display = 'table';
    tbody.innerHTML = records.map((r, i) => {
        const sourceBadge = r.source === 'capital'
            ? `<span class="badge badge-capital"><i class="fa-solid fa-building-columns"></i> Capital</span>`
            : `<span class="badge badge-asset"><i class="fa-solid fa-box"></i> Asset</span>`;
        const statusBadge = r.status
            ? `<span class="badge ${r.status === 'Active' ? 'badge-active' : 'badge-inactive'}">${r.status}</span>`
            : `<span style="color:#9ca3af">—</span>`;
        let cells = '';
        if (currentTab === 'capital' && r.source === 'capital') {
            cells = `
                <td>${i + 1}</td>
                <td>${sourceBadge}</td>
                <td>${r.capitalId || '—'}</td>
                <td>${r.capitalType || '—'}</td>
                <td>${r.financialYear || '—'}</td>
                <td>${r.allocated !== undefined ? '₹' + Number(r.allocated).toLocaleString() : '—'}</td>
                <td>${r.used !== undefined ? '₹' + Number(r.used).toLocaleString() : '—'}</td>
                <td>${r.remaining !== undefined ? '₹' + Number(r.remaining).toLocaleString() : '—'}</td>
                <td>${statusBadge}</td>
                <td>${r.remarks || '—'}</td>
            `;
        } else if (currentTab === 'asset' && r.source === 'asset') {
            cells = `
                <td>${i + 1}</td>
                <td>${sourceBadge}</td>
                <td>${r.requestId || '—'}</td>
                <td>${r.requesterName || '—'}</td>
                <td>${r.requestDate || '—'}</td>
                <td>${r.qty || '—'}</td>
                <td>${r.requestTo || '—'}</td>
                <td>${r.capitalType || '—'}</td>
                <td>${r.remarks || '—'}</td>
            `;
        } else {
            // Combined "All" view
            if (r.source === 'capital') {
                cells = `
                    <td>${i + 1}</td>
                    <td>${sourceBadge}</td>
                    <td>${r.capitalId || '—'}</td>
                    <td>${r.capitalType || '—'}</td>
                    <td>${r.financialYear || '—'}</td>
                    <td>${r.capitalType || '—'}</td>
                    <td>${statusBadge}</td>
                    <td>${r.remarks || '—'}</td>
                `;
            } else {
                cells = `
                    <td>${i + 1}</td>
                    <td>${sourceBadge}</td>
                    <td>${r.requestId || '—'}</td>
                    <td>${r.requesterName || '—'}</td>
                    <td>${r.requestDate || '—'}</td>
                    <td>${r.capitalType || '—'}</td>
                    <td>${r.qty || '—'}</td>
                    <td>${r.remarks || '—'}</td>
                `;
            }
        }
        return `<tr>
            ${cells}
            <td>
                <button class="action-btn btn-view" onclick='viewRecord(${JSON.stringify(JSON.stringify(r))})'>
                    <i class="fa-solid fa-eye"></i> View
                </button>
                &nbsp;
                <button class="action-btn btn-delete" onclick="deleteRecord('${r.source}', '${r._id}')">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        </tr>`;
    }).join('');
}
/* TAB SWITCH */
function filterTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', ['all','capital','asset'][i] === tab);
    });
    renderTable();
}
/*VIEW MODAL */
function viewRecord(jsonStr) {
    const r = JSON.parse(jsonStr);
    const isCapital = r.source === 'capital';
    document.getElementById('modalTitle').innerHTML = isCapital
        ? '<i class="fa-solid fa-building-columns"></i> Capital Record Details'
        : '<i class="fa-solid fa-box"></i> Asset Request Details';
    const rows = isCapital ? [
        ['Capital ID', r.capitalId],
        ['Capital Type', r.capitalType],
        ['Financial Year', r.financialYear],
        ['Fund Allocated', r.allocated !== undefined ? '₹' + Number(r.allocated).toLocaleString() : '—'],
        ['Fund Used', r.used !== undefined ? '₹' + Number(r.used).toLocaleString() : '—'],
        ['Remaining Fund', r.remaining !== undefined ? '₹' + Number(r.remaining).toLocaleString() : '—'],
        ['Status', r.status],
        ['Remarks', r.remarks || '—'],
        ['Saved On', r.savedOn || '—'],
    ] : [
        ['Request ID', r.requestId],
        ['Requester Name', r.requesterName],
        ['Request Date', r.requestDate],
        ['Quantity', r.qty],
        ['Request To', r.requestTo],
        ['Capital Type', r.capitalType],
        ['Remarks', r.remarks || '—'],
        ['Saved On', r.savedOn || '—'],
    ];
    document.getElementById('modalBody').innerHTML = rows.map(([label, val]) => `
        <div class="modal-row">
            <div class="modal-label">${label}</div>
            <div class="modal-value">${val || '—'}</div>
        </div>
    `).join('');
    document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
/* DELETE RECORD */
function deleteRecord(source, id) {
    if (!confirm('Are you sure you want to delete this record?')) return;
    const key = source === 'capital' ? CAPITAL_KEY : ASSET_KEY;
    let records = JSON.parse(localStorage.getItem(key) || '[]');
    records = records.filter(r => r._id !== id);
    localStorage.setItem(key, JSON.stringify(records));
    renderSummary();
    renderTable();
}/* EXPORT CSV*/
function exportCSV() {
    const records = getFiltered();
    if (!records.length) { alert('No records to export.'); return; }
    const headers = ['Source', 'ID', 'Type', 'Financial Year / Date', 'Allocated / Qty', 'Used / RequestTo', 'Remaining', 'Status', 'Remarks', 'Saved On'];
    const rows = records.map(r => {
        if (r.source === 'capital') {
            return [
                'Capital', r.capitalId, r.capitalType, r.financialYear,
                r.allocated, r.used, r.remaining, r.status, r.remarks, r.savedOn
            ];
        } else {
            return [
                'Asset', r.requestId, r.capitalType, r.requestDate,
                r.qty, r.requestTo, '', '', r.remarks, r.savedOn
            ];
        }
    });
    const csv = [headers, ...rows].map(row =>
        row.map(v => `"${(v || '').toString().replace(/"/g, '""')}"`).join(',')
    ).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'records_export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
/*INIT */
renderSummary();
renderTable();
</script>
